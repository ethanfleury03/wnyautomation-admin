      <stop offset="0%" stop-color="#0E1A2B"/>
      <stop offset="100%" stop-color="#1b2a44"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <g transform="translate(600 300)" fill="#F26A1F">
