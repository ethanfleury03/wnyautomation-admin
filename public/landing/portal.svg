<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000" role="img" aria-label="Portal photo placeholder: laptop on kitchen island showing customer portal with upcoming appointments">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf7f2"/>
      <stop offset="100%" stop-color="#e8ded0"/>
    </linearGradient>
    <linearGradient id="marble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4eee3"/>
      <stop offset="100%" stop-color="#ddd1bd"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="1000" fill="url(#bg)"/>

  <rect x="0" y="660" width="1000" height="340" fill="url(#marble)"/>
  <g opacity="0.2" stroke="#6b5b3f" fill="none">
    <path d="M0 720 Q 260 700 520 730 T 1000 720"/>
    <path d="M0 790 Q 200 770 460 800 T 1000 790"/>
    <path d="M0 860 Q 300 840 620 870 T 1000 860"/>
  </g>

  <g transform="translate(230 380)">
    <rect x="-20" y="260" width="580" height="38" rx="10" fill="#0b1422"/>
    <rect width="540" height="300" rx="14" fill="#0b1422"/>
    <rect x="10" y="10" width="520" height="280" rx="8" fill="#faf7f2"/>
    <rect x="30" y="30" width="180" height="16" rx="3" fill="#f26a1f"/>
    <rect x="30" y="54" width="300" height="26" rx="4" fill="#0e1a2b"/>
    <rect x="30" y="100" width="480" height="90" rx="10" fill="#f5f1ea" stroke="#e5dfd4"/>
    <text x="50" y="130" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Your upcoming visit</text>
    <text x="50" y="160" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#0e1a2b">Wed, Apr 17 · 24 PM</text>
    <text x="50" y="182" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Tech: Dan G. · Ford Transit 212</text>
    <g transform="translate(30 210)">
      <rect x="0" y="0" width="150" height="32" rx="6" fill="#ffffff" stroke="#e5dfd4"/>
      <text x="75" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0e1a2b">Reschedule</text>
      <rect x="160" y="0" width="150" height="32" rx="6" fill="#ffffff" stroke="#e5dfd4"/>
      <text x="235" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0e1a2b">Message tech</text>
      <rect x="320" y="0" width="160" height="32" rx="6" fill="#f26a1f"/>
      <text x="400" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff">View invoice</text>
    </g>
  </g>

  <g transform="translate(800 560)">
    <rect x="-22" y="0" width="44" height="120" rx="6" fill="#ffffff" stroke="#cfcfcf" opacity="0.9"/>
    <rect x="-16" y="8" width="32" height="100" rx="3" fill="#c7b998"/>
    <ellipse cx="0" cy="-12" rx="18" ry="10" fill="#0b1422" opacity="0.2"/>
  </g>

  <rect x="60" y="60" width="4" height="32" fill="#f26a1f"/>
  <text x="80" y="86" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#0e1a2b" letter-spacing="4">PORTAL PHOTO PLACEHOLDER</text>
  <text x="60" y="930" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#0e1a2b">Laptop · kitchen island · customer portal</text>
</svg>
