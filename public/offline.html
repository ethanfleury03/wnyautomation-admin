<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#10251d" />
    <title>Offline | WNY Automation Admin</title>
    <style>
      :root {
        color: #17241f;
        background: #f3f5f1;
        font-family: Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100dvh;
        margin: 0;
        padding: max(24px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
        place-items: center;
      }

      main {
        width: min(100%, 520px);
        padding: 24px;
        background: #fffefa;
        border: 1px solid rgba(88, 111, 95, 0.22);
        border-radius: 8px;
        box-shadow: 0 18px 48px rgba(16, 28, 50, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.75rem, 7vw, 2.35rem);
        line-height: 1.08;
      }

      p {
        margin: 0 0 18px;
        color: #607068;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        color: #ffffff;
        background: #2f6b4f;
        border-radius: 8px;
        font-weight: 760;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Admin is offline.</h1>
      <p>Reconnect and refresh to load current tickets, portal users, and staging status. Admin changes are kept online-first to avoid conflicts.</p>
      <a href="/admin">Try admin again</a>
    </main>
  </body>
</html>
